<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="refresh" content="0; url=apps/neurocell-explorer/" />
    <title>Neurolab</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #e8eceb;
        --ink: #182022;
        --muted: #5f6d70;
        --accent: #2e5e61;
        --line: #cfd8d6;
      }

      * {
        box-sizing: border-box;
      }

      body {
        display: grid;
        min-height: 100vh;
        margin: 0;
        place-items: center;
        background: radial-gradient(circle at 50% 35%, #f8faf8 0, var(--bg) 68%);
        color: var(--ink);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(640px, calc(100vw - 32px));
        padding: 28px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(248, 249, 247, 0.92);
        box-shadow: 0 20px 60px rgba(24, 32, 34, 0.12);
      }

      p {
        margin: 0;
        color: var(--muted);
        line-height: 1.5;
      }

      h1 {
        margin: 0 0 10px;
        font-size: clamp(30px, 5vw, 52px);
        line-height: 1;
        letter-spacing: 0;
      }

      a {
        display: inline-flex;
        align-items: center;
        min-height: 42px;
        margin-top: 22px;
        padding: 0 14px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
        color: var(--accent);
        font-weight: 800;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Neurolab</h1>
      <p>Redirigiendo a NeuroCell Explorer.</p>
      <a href="apps/neurocell-explorer/">Abrir NeuroCell Explorer</a>
    </main>
  </body>
</html>
