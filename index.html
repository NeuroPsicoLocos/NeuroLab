<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>NeuroLab</title>
    <meta name="description" content="Laboratorio interactivo de neurociencia computacional, visualización 3D y docencia." />
    <style>
      :root {
        color-scheme: light;
        --bg: #e8eceb;
        --ink: #182022;
        --muted: #5f6d70;
        --accent: #2e5e61;
        --accent-hover: #234849;
        --line: #cfd8d6;
        --card-bg: rgba(248, 249, 247, 0.96);
      }

      * {
        box-sizing: border-box;
      }

      body {
        display: grid;
        min-height: 100vh;
        margin: 0;
        place-items: center;
        background: radial-gradient(circle at 50% 35%, #f8faf8 0, var(--bg) 68%);
        color: var(--ink);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .portal {
        width: min(680px, calc(100vw - 32px));
        padding: 40px 36px 36px;
        border: 1px solid var(--line);
        border-radius: 12px;
        background: var(--card-bg);
        box-shadow: 0 20px 60px rgba(24, 32, 34, 0.12);
      }

      .portal-header {
        margin-bottom: 32px;
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(32px, 5vw, 54px);
        line-height: 1;
        letter-spacing: -0.5px;
        color: var(--ink);
      }

      .subtitle {
        margin: 0;
        font-size: clamp(14px, 2vw, 16px);
        color: var(--muted);
        line-height: 1.5;
      }

      .apps-grid {
        display: grid;
        gap: 16px;
      }

      .app-card {
        display: flex;
        align-items: center;
        gap: 16px;
        padding: 18px 20px;
        border: 1px solid var(--line);
        border-radius: 10px;
        background: #fff;
        color: var(--ink);
        text-decoration: none;
        transition: border-color 0.15s, box-shadow 0.15s;
      }

      .app-card:hover,
      .app-card:focus-visible {
        border-color: var(--accent);
        box-shadow: 0 4px 16px rgba(46, 94, 97, 0.12);
        outline: none;
      }

      .app-card-icon {
        flex-shrink: 0;
        width: 44px;
        height: 44px;
        border-radius: 8px;
        background: var(--accent);
        display: grid;
        place-items: center;
        color: #fff;
        font-size: 22px;
      }

      .app-card-body {
        min-width: 0;
      }

      .app-card-title {
        display: block;
        font-size: 15px;
        font-weight: 700;
        color: var(--accent);
        margin-bottom: 2px;
      }

      .app-card-desc {
        display: block;
        font-size: 13px;
        color: var(--muted);
        line-height: 1.4;
      }
    </style>
  </head>
  <body>
    <main class="portal">
      <header class="portal-header">
        <h1>NeuroLab</h1>
        <p class="subtitle">Laboratorio interactivo de neurociencia computacional, visualización 3D y docencia.</p>
      </header>

      <nav class="apps-grid" aria-label="Aplicaciones disponibles">
        <a class="app-card" href="/apps/neurocell-explorer/">
          <span class="app-card-icon" aria-hidden="true">🧠</span>
          <span class="app-card-body">
            <span class="app-card-title">NeuroCell Explorer</span>
            <span class="app-card-desc">Atlas 3D interactivo de tipos celulares del sistema nervioso.</span>
          </span>
        </a>
      </nav>
    </main>
  </body>
</html>
